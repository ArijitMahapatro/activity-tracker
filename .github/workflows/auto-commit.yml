name: Daily Commit

on:
  schedule:
    - cron: "30 4 * * *"   # Runs daily at 10 AM IST
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Make changes
        run: |
          echo "Updated on $(date)" >> log.txt

      - name: Commit changes
        run: |
          git config --global user.name "Arijit Mahapatro"
          git config --global user.email "arijitmahapatro@gmail.com"
          git add .
          git commit -m "Auto update $(date)" || echo "No changes"
          git push
